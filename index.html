          "acceptedAnswer": { "@type": "Answer", "text": "Pricing for our custom cabinetry solutions in Brooklyn, Manhattan, and Queens typically runs $350 per linear foot for full kitchens and vanities, $225/lf for base cabinets, and $125/lf for wall cabinets. A typical NYC kitchen ranges between $8,000 and $25,000+." }
        },
        {
          "@type": "Question",
          "name": "How long does a custom kitchen cabinetry project take in NYC?",
          "acceptedAnswer": { "@type": "Answer", "text": "Most projects take 4–6 weeks: 1–2 weeks for design, 2–3 weeks of in-shop fabrication, and 3–7 days for installation in your Brooklyn, Manhattan, or Queens home." }

          "name": "Do you handle both kitchens and bathroom vanities?",

        },
        {
          "@type": "Question",
          "name": "Where do you source your materials?",
          "acceptedAnswer": { "@type": "Answer", "text": "FSC-certified hardwoods from Northeast mills, formaldehyde-free plywood cores, NYC-area stone slabs, Blum and Hettich hardware, and low-VOC conversion varnish finishes." }

          "name": "Do you provide Certificates of Insurance (COIs) for condo and co-op buildings?",
